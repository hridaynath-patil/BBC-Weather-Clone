<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBC Weather Clone</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">

    <!-- TOP NAV -->
    <div class="top-nav">
      <div class="container">

        <!-- LEFT -->
        <div class="left">
          <div class="logo">
            <span>B</span><span>B</span><span>C</span>
          </div>

          <a href="signin.html" class="signin" style="text-decoration: none; color: inherit;">
            <div class="user-icon"></div>
            <span>Sign in</span>
          </a>

          <div class="divider"></div>
        </div>

        <!-- CENTER NAV -->
        <ul class="nav">
          <li><a href="index.html" style="text-decoration: none; color: inherit;">Home</a></li>
          <li>News</li>
          <li><a href="sport.html" style="text-decoration: none; color: inherit;">Sport</a></li>
          <li>Business</li>
          <li>Technology</li>
          <li>Health</li>
          <li>Culture</li>
        </ul>

        <!-- RIGHT -->
        <div class="right">
          <span class="dots">•••</span>
          <span class="search-icon">
            <svg class="orbit-search-button-icon-only" width="28" height="29">
              <path
                d="M11,-0.0001 C17.0751322,-0.0001 22,4.92476775 22,10.9999 C22,13.5276632 21.1473793,15.8562862 19.7140404,17.7138664 L28,26 L25,29 L16.518046,20.5178339 C14.8960209,21.4602385 13.0110328,21.9999 11,21.9999 C4.92486775,21.9999 0,17.0750322 0,10.9999 C0,4.92476775 4.92486775,-0.0001 11,-0.0001 Z M11,2.5 C6.30557963,2.5 2.5,6.30557963 2.5,11 C2.5,15.6944204 6.30557963,19.5 11,19.5 C15.6944204,19.5 19.5,15.6944204 19.5,11 C19.5,6.30557963 15.6944204,2.5 11,2.5 Z">
              </path>
            </svg>
          </span>
        </div>

      </div>
    </div>

    <!-- WEATHER BAR -->
    <div class="weather-bar">
      <div class="container">
        <h1>WEATHER</h1>

        <div class="weather-search">
          <input type="text" placeholder="Enter a city">
          <span class="search-icon">
            <svg class="orbit-search-button-icon-only" width="28" height="29">
              <path
                d="M11,-0.0001 C17.0751322,-0.0001 22,4.92476775 22,10.9999 C22,13.5276632 21.1473793,15.8562862 19.7140404,17.7138664 L28,26 L25,29 L16.518046,20.5178339 C14.8960209,21.4602385 13.0110328,21.9999 11,21.9999 C4.92486775,21.9999 0,17.0750322 0,10.9999 C0,4.92476775 4.92486775,-0.0001 11,-0.0001 Z M11,2.5 C6.30557963,2.5 2.5,6.30557963 2.5,11 C2.5,15.6944204 6.30557963,19.5 11,19.5 C15.6944204,19.5 19.5,15.6944204 19.5,11 C19.5,6.30557963 15.6944204,2.5 11,2.5 Z">
              </path>
            </svg>
          </span>

        </div>
      </div>
    </div>

  </header>

  <main id="main-content">
    <!-- Main content will be dynamically loaded here from main.html -->
  </main>

  <script>
    // Dynamically load the main section
    fetch('main.html')
      .then(response => {
        if (!response.ok) throw new Error('Failed to load main.html');
        return response.text();
      })
      .then(data => {
        document.getElementById('main-content').innerHTML = data;
      })
      .catch(error => {
        console.error('Error loading main section:', error);
        document.getElementById('main-content').innerHTML = '<p style="text-align:center; padding: 20px; color: #fff;">Could not load content. Please ensure you are running a local server (like Live Server).</p>';
      });
  </script>

  <!-- Sign In page has been moved to signin.html -->

</body>

</html>
